# This is a Databricks asset bundle definition for retail_streaming_platform.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: retail_streaming_platform
  uuid: 52528a2a-11d7-4f51-a0de-e59ecc294093

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-c04a5ad1-7844.cloud.databricks.com
    variables:
      catalog: dbr_dev
      schema: ${workspace.current_user.short_name}
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-c04a5ad1-7844.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/yanquiel.arango@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/yanquiel.arango@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbr_dev
      schema: prod
    permissions:
      - user_name: yanquiel.arango@gmail.com
        level: CAN_MANAGE
