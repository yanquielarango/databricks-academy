resources:
  jobs:
    orders_batch_ingestion_job:
      name: orders_batch_ingestion_job

      tasks:

        - task_key: split_orders

          existing_cluster_id: 0702-132442-toro5spu

          spark_python_task:
            python_file: ../src/Lab_3/split_orders.py


        - task_key: simulate_file_arrival

          depends_on:
            - task_key: split_orders

          existing_cluster_id: 0702-132442-toro5spu

          spark_python_task:
            python_file: ../src/Lab_3/simulate_file_arrival.py


        - task_key: autoloader_orders

          depends_on:
            - task_key: simulate_file_arrival

          existing_cluster_id: 0702-132442-toro5spu

          notebook_task:
            notebook_path: ../src/Lab_3/autoloader_orders.ipynb


        - task_key: create_bronze_table

          depends_on:
            - task_key: autoloader_orders

          existing_cluster_id: 0702-132442-toro5spu

          notebook_task:
            notebook_path: ../src/Lab_3/create_bronze_tables.ipynb