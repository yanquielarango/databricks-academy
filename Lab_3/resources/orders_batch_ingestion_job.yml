resources:
  jobs:
    generate_batch_job:
      name: generate_batch_job

      parameters:
        - name: scenario
          default: "reload"

      tasks:

        - task_key: generate_batch

          existing_cluster_id: 0708-224238-ketjva8y

          spark_python_task:
            python_file: ../../src/Lab/generate_batch.py
            parameters:
              - "--scenario"
              - "{{job.parameters.scenario}}"


        - task_key: autoloader_orders

          depends_on:
            - task_key: generate_batch

          existing_cluster_id: 0708-224238-ketjva8y

          notebook_task:
            notebook_path: ../../src/Lab/autoloader_orders.ipynb